name: "Feature request"
description: "Propose an enhancement"
labels: ["enhancement"]
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make this project better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'm always frustrated when the page doesn't remember scroll position on navigation..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: "Implement scroll-to-top on route change and preserve scroll position when using browser back/forward."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: "I considered a manual scroll-to-top button, but automatic handling would be smoother."

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's in scope and out of scope for this feature?
      placeholder: |
        **In scope:**
        - Scroll to top on route change
        - Preserve scroll on browser back/forward

        **Out of scope:**
        - Scroll animation customization
        - Anchor link offset handling

  - type: textarea
    id: risks
    attributes:
      label: Risks & Considerations
      description: Are there any risks, tradeoffs, or technical concerns?
      placeholder: "May conflict with existing ScrollReveal component behavior. Need to test with Framer Motion."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples.
      placeholder: "Here's how Next.js handles this..."
